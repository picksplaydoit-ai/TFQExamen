<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Critical for mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Examen: Técnicas Físico-Químicas</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prevents horizontal scroll on some mobile browsers */
        body {
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .hidden { display: none; }
        
        /* Custom styles for the feedback cards */
        .feedback-card {
            transition: transform 0.2s ease;
        }
        
        /* Loading animation for the submit button */
        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }

        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 leading-relaxed">

    <!-- Notification System -->
    <div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] w-full max-w-xs px-4 pointer-events-none">
        <div id="toast-message" class="bg-slate-900 text-white p-4 rounded-2xl shadow-2xl text-center text-sm font-bold opacity-0 transition-all duration-300 transform -translate-y-4">
            <!-- Dynamic content -->
        </div>
    </div>

    <!-- 1. Start / Registration Screen -->
    <div id="welcome-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl border border-slate-200 p-8 md:p-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center p-4 bg-indigo-600 rounded-3xl mb-6 shadow-lg shadow-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.642.316a10 10 0 01-6.713.047l-.248-.088a2 2 0 00-2.164 1.104l-1.026 2.147a2 2 0 001.385 2.766l2.387.477a6 6 0 003.86-.517l.642-.316a10 10 0 016.713-.047l.248.088a2 2 0 002.164-1.104l1.026-2.147a2 2 0 00-1.385-2.766z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Evaluación Pro</h1>
                <p class="text-slate-500 mt-2 font-medium">Técnicas Físico-Químicas</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label for="student-name" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Nombre del Estudiante</label>
                    <input type="text" id="student-name" 
                        class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-50/50 outline-none transition-all placeholder:text-slate-300" 
                        placeholder="Ej. Pedro Pérez">
                </div>
                <button onclick="handleStart()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl transition-all shadow-xl shadow-indigo-100 active:scale-95 flex items-center justify-center gap-2">
                    Comenzar Evaluación
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
            <p class="mt-8 text-center text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Powered by Laboratory Analytics v2.2</p>
        </div>
    </div>

    <!-- 2. Main Quiz Screen -->
    <div id="exam-container" class="max-w-4xl mx-auto my-6 px-4 hidden">
        <header class="bg-slate-900 text-white p-6 rounded-[2rem] shadow-2xl mb-8 flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-indigo-500">
            <div class="text-center md:text-left">
                <h2 class="text-xl font-black tracking-tight">TÉCNICAS FÍSICO-QUÍMICAS</h2>
                <div class="flex items-center gap-2 mt-1 justify-center md:justify-start">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <p id="display-name" class="text-indigo-200 text-xs font-bold uppercase tracking-widest"></p>
                </div>
            </div>
            <div class="px-4 py-2 bg-slate-800 rounded-xl text-[10px] font-black border border-slate-700 tracking-tighter text-indigo-300">
                EXAMEN TEÓRICO INSTRUMENTAL
            </div>
        </header>

        <form id="quiz-form" class="space-y-6 pb-20">
            <div id="questions-pool" class="grid gap-6">
                <!-- Dynamic Questions -->
            </div>

            <div class="mt-12 p-8 bg-white rounded-[2rem] shadow-xl border border-slate-200 text-center">
                <p class="text-slate-400 text-xs mb-6 font-bold uppercase">Revisa tus respuestas antes de enviar</p>
                <button type="button" id="submit-btn" onclick="handleSubmit()" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 px-16 rounded-2xl shadow-2xl shadow-indigo-100 transition-all transform hover:-translate-y-1 active:translate-y-0 w-full md:w-auto">
                    FINALIZAR Y ENVIAR
                </button>
            </div>
        </form>
    </div>

    <!-- 3. Results Screen -->
    <div id="results-screen" class="max-w-4xl mx-auto my-10 hidden px-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
            <div id="result-header" class="p-12 text-center text-white transition-colors duration-700">
                <h2 class="text-sm font-black tracking-[0.3em] uppercase opacity-80 mb-4">Reporte de Desempeño</h2>
                <p id="final-student-name" class="text-3xl font-black mb-6"></p>
                <div class="relative inline-block">
                    <div id="score-badge" class="bg-white text-slate-900 px-12 py-6 rounded-[2rem] text-5xl font-black shadow-2xl">
                        0%
                    </div>
                </div>
            </div>

            <div class="p-8 md:p-12 bg-slate-50/50">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Retroalimentación</h3>
                    <span class="text-[10px] bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold">DETALLE TÉCNICO</span>
                </div>
                <div id="feedback-list" class="space-y-6">
                    <!-- Feedback Items -->
                </div>
            </div>
        </div>
        <footer class="mt-10 text-center text-slate-400 text-xs font-bold pb-10 uppercase tracking-widest">
            Fin de la evaluación
        </footer>
    </div>

    <script>
        const questions = [
            {
                id: 'q1',
                text: "¿Cuál es el fundamento químico del método de Fehling?",
                options: { a: "Oxidación de proteínas en medio ácido.", b: "Reducción del ion Cu²⁺ a Cu₂O (precipitado rojo) por azúcares reductores.", c: "Complejación de nitrógeno orgánico con sales de hierro.", d: "Precipitación de sales por temperatura." },
                correct: 'b',
                feedback: "El reactivo de Fehling oxida los azúcares reductores mientras el cobre se reduce a óxido cuproso rojo."
            },
            {
                id: 'q2',
                text: "¿Qué se determina realmente en el método de Kjeldahl antes de calcular la proteína?",
                options: { a: "Aminoácidos esenciales.", b: "Lípidos totales.", c: "Nitrógeno Orgánico Total.", d: "Peso seco de la muestra." },
                correct: 'c',
                feedback: "Kjeldahl cuantifica el nitrógeno total; luego se usa un factor de conversión para estimar la proteína."
            },
            {
                id: 'q3',
                text: "¿Qué representa el Coeficiente de Variación (CV) en un análisis?",
                options: { a: "La cercanía al valor verdadero.", b: "La sensibilidad máxima del detector.", c: "La precisión relativa (Desviación estándar / Media) en %.", d: "El intercepto de la curva." },
                correct: 'c',
                feedback: "El CV es una medida de precisión que permite comparar la dispersión entre diferentes conjuntos de datos."
            },
            {
                id: 'q4',
                text: "¿Para qué sirven las Tablas ANSI (Z1.4) en un laboratorio industrial?",
                options: { a: "Cálculo de pesos moleculares.", b: "Determinación de pH.", c: "Definición de planes de muestreo de aceptación (AQL).", d: "Estandarización de HCl." },
                correct: 'c',
                feedback: "Son tablas estadísticas usadas para decidir el tamaño de muestra necesario para aceptar o rechazar un lote."
            },
            {
                id: 'q5',
                text: "En una regresión lineal (y = mx + b), ¿qué representa la variable 'y'?",
                options: { a: "La concentración de los estándares.", b: "La señal medida (Absorbancia, voltaje, etc.).", c: "La pendiente de la recta.", d: "El error del equipo." },
                correct: 'b',
                feedback: "La 'y' representa la respuesta del instrumento, la cual depende de la concentración (x)."
            },
            {
                id: 'q6',
                text: "¿Qué sucede con la densidad de una mezcla al aumentar la concentración de alcohol?",
                options: { a: "Aumenta proporcionalmente.", b: "Disminuye progresivamente.", c: "Se mantiene igual a 1 g/mL.", d: "Oscila aleatoriamente." },
                correct: 'b',
                feedback: "El etanol es menos denso que el agua (0.789 g/mL), por lo que a mayor alcohol, menor densidad."
            },
            {
                id: 'q7',
                text: "¿Qué es una unidad de concentración FISICA?",
                options: { a: "Molaridad (M).", b: "Normalidad (N).", c: "Porcentaje en masa (% p/p).", d: "Formalidad (F)." },
                correct: 'c',
                feedback: "Las unidades físicas relacionan cantidades de masa o volumen sin recurrir al concepto de 'mol'."
            },
            {
                id: 'q8',
                text: "¿Qué es el 'Punto de Equivalencia' en una volumetría?",
                options: { a: "Cuando el indicador cambia de color.", b: "Cuando los equivalentes de titulante igualan a los de la muestra.", c: "Cuando se acaba el reactivo.", d: "Cuando el pH llega a 14." },
                correct: 'b',
                feedback: "Es el punto teórico donde la reacción química se completa según su estequiometría."
            },
            {
                id: 'q9',
                text: "¿Qué indica un valor de R² = 0.999 en una curva de calibración?",
                options: { a: "Excelente linealidad y ajuste de los datos.", b: "Falla crítica en el equipo.", c: "Concentración fuera de rango.", d: "Error sistemático severo." },
                correct: 'a',
                feedback: "Un R² cercano a 1 garantiza que el modelo matemático lineal explica casi perfectamente la relación de los datos."
            },
            {
                id: 'q10',
                text: "En gravimetría, ¿qué significa llevar una muestra a 'Peso Constante'?",
                options: { a: "Pesar siempre la misma cantidad.", b: "Que pesadas sucesivas no varíen significativamente tras el secado.", c: "Calibrar la balanza analítica.", d: "Pesar en una balanza granataria." },
                correct: 'b',
                feedback: "Asegura que se ha eliminado toda la humedad o componentes volátiles de la muestra analizada."
            },
            {
                id: 'q11',
                text: "¿Cómo se define la Molaridad (M)?",
                options: { a: "Gramos / Litro.", b: "Moles de soluto / kg de solvente.", c: "Moles de soluto / Litro de solución.", d: "Equivalentes / Litro." },
                correct: 'c',
                feedback: "La molaridad relaciona la cantidad de sustancia (moles) con el volumen total de la mezcla."
            },
            {
                id: 'q12',
                text: "¿Cuál es el rango de viraje aproximado de la Fenolftaleína?",
                options: { a: "1.0 - 3.0", b: "8.2 - 10.0", c: "4.2 - 6.3", d: "12.0 - 14.0" },
                correct: 'b',
                feedback: "Vira de incoloro a rosa/fucsia en medio básico, siendo ideal para titulaciones de ácidos fuertes."
            },
            {
                id: 'q13',
                text: "¿Qué se entiende por 'Blanco de reactivos'?",
                options: { a: "Una muestra pura.", b: "Solución con reactivos excepto el analito.", c: "Un estándar de calibración.", d: "Agua de la llave." },
                correct: 'b',
                feedback: "Se procesa igual que la muestra para restar interferencias causadas por los propios reactivos."
            },
            {
                id: 'q14',
                text: "¿Para qué sirve un indicador en una neutralización?",
                options: { a: "Para limpiar la muestra.", b: "Para visualizar el cambio de pH cerca del punto de equivalencia.", c: "Para acelerar la reacción.", d: "Para estabilizar la temperatura." },
                correct: 'b',
                feedback: "Son ácidos o bases débiles que cambian de color al variar el pH, señalando el final de la titulación."
            },
            {
                id: 'q15',
                text: "¿Qué es la Normalidad (N)?",
                options: { a: "Moles / Litro.", b: "Equivalentes-gramo / Litro.", c: "Masa / Volumen.", d: "Porcentaje molar." },
                correct: 'b',
                feedback: "Relaciona los equivalentes químicos (capacidad de reacción) con el volumen de la solución."
            }
        ];

        // UI Utility: Show custom notification
        function toast(msg) {
            const el = document.getElementById('toast-message');
            el.innerText = msg;
            el.classList.add('opacity-100', 'translate-y-0');
            el.classList.remove('opacity-0', '-translate-y-4');
            setTimeout(() => {
                el.classList.remove('opacity-100', 'translate-y-0');
                el.classList.add('opacity-0', '-translate-y-4');
            }, 3000);
        }

        // Logic: Switch to Quiz Screen
        function handleStart() {
            const name = document.getElementById('student-name').value.trim();
            if (!name) {
                toast("⚠️ Ingresa tu nombre completo");
                return;
            }
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('exam-container').classList.remove('hidden');
            document.getElementById('display-name').innerText = name;
            renderQuestions();
            window.scrollTo(0,0);
        }

        // Logic: Render Questions
        function renderQuestions() {
            const container = document.getElementById('questions-pool');
            container.innerHTML = questions.map((q, i) => `
                <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-200">
                    <p class="font-black text-slate-800 mb-6 flex items-start gap-4">
                        <span class="flex-shrink-0 w-8 h-8 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center text-sm font-black border border-indigo-100">${i + 1}</span>
                        <span class="pt-1">${q.text}</span>
                    </p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 ml-0 md:ml-12">
                        ${Object.entries(q.options).map(([key, val]) => `
                            <label class="flex items-center p-4 rounded-2xl border-2 border-slate-50 bg-slate-50 hover:border-indigo-200 hover:bg-indigo-50/30 cursor-pointer transition-all active:scale-[0.98]">
                                <input type="radio" name="${q.id}" value="${key}" class="w-5 h-5 text-indigo-600 border-slate-300 focus:ring-indigo-500 mr-4">
                                <span class="text-sm font-semibold text-slate-600">
                                    <span class="text-indigo-400 mr-1 uppercase">${key})</span> ${val}
                                </span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Logic: Process Submission
        function handleSubmit() {
            const form = document.getElementById('quiz-form');
            const name = document.getElementById('student-name').value.trim();
            const answered = form.querySelectorAll('input[type="radio"]:checked').length;
            
            if (answered < questions.length) {
                toast(`⚠️ Falta responder ${questions.length - answered} preguntas`);
            }
            
            // Artificial delay for "processing" feel
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = `<span class="flex items-center gap-2">Procesando... <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></span>`;
            btn.classList.add('btn-loading');

            setTimeout(() => {
                processScore(form, name);
            }, 1000);
        }

        function processScore(form, name) {
            let score = 0;
            const feedbackList = document.getElementById('feedback-list');
            feedbackList.innerHTML = '';

            questions.forEach((q, i) => {
                const selected = form.querySelector(`input[name="${q.id}"]:checked`);
                const isCorrect = selected && selected.value === q.correct;
                if (isCorrect) score++;

                const card = document.createElement('div');
                card.className = `feedback-card p-6 rounded-[1.5rem] border-2 shadow-sm ${isCorrect ? 'bg-green-50/50 border-green-100' : 'bg-red-50/50 border-red-100'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-black uppercase tracking-widest ${isCorrect ? 'text-green-600' : 'text-red-600'}">Reactivo ${i + 1}</span>
                        <div class="px-3 py-1 rounded-full text-[9px] font-black ${isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} uppercase">
                            ${isCorrect ? 'Correcto' : 'Revisar'}
                        </div>
                    </div>
                    <p class="text-sm font-bold text-slate-800 mb-4">${q.text}</p>
                    <div class="grid gap-2 mb-4">
                        <div class="text-[11px] p-3 rounded-xl bg-white border border-slate-100">
                            <span class="text-slate-400 font-bold uppercase mr-2">Tu elección:</span>
                            <span class="font-bold ${isCorrect ? 'text-green-600' : 'text-red-400'}">
                                ${selected ? selected.value.toUpperCase() + ') ' + q.options[selected.value] : 'N/A'}
                            </span>
                        </div>
                        ${!isCorrect ? `
                        <div class="text-[11px] p-3 rounded-xl bg-white border border-indigo-100">
                            <span class="text-indigo-400 font-bold uppercase mr-2">Correcta:</span>
                            <span class="font-bold text-indigo-600">${q.correct.toUpperCase()}) ${q.options[q.correct]}</span>
                        </div>` : ''}
                    </div>
                    <div class="bg-white/50 p-3 rounded-xl border border-slate-100/50">
                        <p class="text-[11px] leading-relaxed text-slate-600 font-medium italic">
                            <strong class="text-slate-400 uppercase not-italic mr-1">Fundamento:</strong> ${q.feedback}
                        </p>
                    </div>
                `;
                feedbackList.appendChild(card);
            });

            const percent = Math.round((score / questions.length) * 100);
            document.getElementById('exam-container').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
            document.getElementById('final-student-name').innerText = name;
            
            const badge = document.getElementById('score-badge');
            badge.innerText = `${percent}%`;
            
            const header = document.getElementById('result-header');
            header.className = `p-12 text-center text-white transition-all duration-700 ${percent >= 70 ? 'bg-emerald-500' : 'bg-rose-500'}`;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
